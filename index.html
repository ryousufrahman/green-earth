<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <!-- daisy and tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="max-w-[1200px] mx-auto">
    <main class="pt-4 pb-5 ">
        <h2 class="text-2xl font-bold text-center text-[#15803D]">Choose Your Trees</h2>

        <div class="main-box grid grid-cols-12 gap-8 mt-5">

              <!-- button-catagories -->
            <div class="catagories bg-gray-50 card card-body shadow-xl col-span-3  sticky top-5 h-fit ">
                <h2 class="text-2xl ">Categories</h2>
                <div class="all-catagory-button">
                    <button   class="btn btn-primary w-full mb-2 " id="all-trees-btn">All Trees</button>
                    <div class="space-y-3 " id="catagory-container">
                        <!-- catagories will be dynamically loaded here -->
                    </div>

                </div>
            </div>
               
            <!-- trees-container -->
            
                 <div class="trees bg-gray-50 card card-body shadow-xl  col-span-6 grid grid-cols-1 sm:grid-cols-3 gap-3 " id="trees-container">
               </div>

                 
             
          
           <!-- cart -->
     <div class= "cart  bg-gray-50 card card-body  shadow-xl col-span-3  sticky top-5 h-fit">
                <h2 class="text-2xl font-bold mb-4 ">Your Cart</h2>

         

               <div class="space-y-4">
                    <div id="cartContainer" class="space-y-4">
                        <div class="card card-body bg-slate-100">

                    </div>
               </div>
          </div>
          <div>
                 <div class="flex justify-between items-center bg-green-50 rounded-lg p-4 my-2">
                    <span class="text-xl font-bold">total:</span>
                    <span class="text-xl font-bold" id="total-price">$0</span>
                </div>
              </div>  
      </div>
                       

       
    </main>
    <script src="scripts/index.js"></script>
</body>
</html>
